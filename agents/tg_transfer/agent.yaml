name: tg-transfer-agent
description: "Telegram 聊天資源搬移工具（群組/頻道/用戶/bot 皆可）：支援單則/批量搬移、斷點續傳、跨 Job 去重、媒體搜尋"
priority: 3
route_patterns:
  - "搬移|轉存|複製|搬到|copy to|transfer|備份|搜尋|查詢|search|統計|stats"
sandbox:
  allowed_dirs: []
  writable: false
settings:
  llm: gemini
  default_target_chat: ""
  retry_limit: 3
  progress_interval: 20
  telethon_session: "tg_transfer"
  liveness_check_interval: 24
  search_page_size: 10
  phash_threshold: 10
