name: tg-transfer-agent
description: "Telegram 群組資源搬移工具：支援單則/批量搬移、斷點續傳、跨 Job 去重"
priority: 3
route_patterns:
  - "搬移|轉存|複製群組|搬到|copy to|transfer|備份群組"
sandbox:
  allowed_dirs: []
  writable: false
settings:
  default_target_chat: ""
  retry_limit: 3
  progress_interval: 20
  telethon_session: "tg_transfer"
