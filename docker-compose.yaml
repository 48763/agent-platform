services:
  hub:
    build:
      context: .
      dockerfile: hub/Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - .env/hub.env
    volumes:
      - ./data/hub/.gemini:/root/.gemini
      - ./data/hub/prompts:/data/prompts
      - ./data/hub/data:/data
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/agents')"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file:
      - .env/gateway.env
    volumes:
      - ./data/gateway:/data
    depends_on:
      hub:
        condition: service_healthy
    networks:
      - agent-network


  claude-code-agent:
    build:
      context: .
      dockerfile: agents/claude_code/Dockerfile
    env_file:
      - .env/claude-code-agent.env
    volumes:
      - ~/Desktop/workspaces:/workspace
      - ./data/claude-code-agent/.claude:/root/.claude
      - ./data/claude-code-agent/.claude.json:/root/.claude.json
      - ./data/claude-code-agent/prompts:/data/prompts
    depends_on:
      hub:
        condition: service_healthy
    networks:
      - agent-network


networks:
  agent-network:
    driver: bridge
