services:
  hub:
    build:
      context: .
      dockerfile: hub/Dockerfile
    ports:
      - "9000:9000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/agents')"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      - GATEWAY_MODE=${GATEWAY_MODE:-userbot}
      - HUB_URL=http://hub:9000
      # Bot mode
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Userbot mode
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
      - ALLOWED_CHATS=${ALLOWED_CHATS}
      - SESSION_PATH=/data/bot_session
    volumes:
      - ./data/gateway:/data
    depends_on:
      hub:
        condition: service_healthy
    networks:
      - agent-network

  weather-agent:
    build:
      context: .
      dockerfile: agents/weather/Dockerfile
    environment:
      - HUB_URL=http://hub:9000
      - AGENT_HOST=weather-agent
      - AGENT_PORT=8001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      hub:
        condition: service_healthy
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
